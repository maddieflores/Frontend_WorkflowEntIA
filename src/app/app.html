<main class="main">
  <div class="content" style="text-align: center; display: block;">
    <div class="left-side">
      <h1>UAGRM - Sistema de Workflow</h1>
      <p>Conexión con Spring Boot 4.0.5</p>
    </div>

    <div class="divider" role="separator" aria-label="Divider" style="margin: 2rem auto; height: 2px; width: 50%;"></div>

    <div class="right-side">
      <div *ngIf="datos; else cargando" class="pill-group" style="align-items: center;">
        <div class="pill" style="--pill-accent: var(--bright-blue); font-size: 1.5rem; padding: 20px;">
          <span>{{ datos.mensaje }}</span>
        </div>
        <p style="margin-top: 1rem;">Estado del Backend: <strong>{{ datos.estado }}</strong></p>
      </div>

      <ng-template #cargando>
        <div class="pill" style="--pill-accent: var(--orange-red);">
          <span>Cargando datos desde el puerto 8080...</span>
        </div>
      </ng-template>
    </div>
  </div>
</main>

<router-outlet />
